name: Deploy Telegram Bot Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/bot-worker/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/bot-worker
          npm ci

      - name: Build worker
        run: |
          cd apps/bot-worker
          npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd apps/bot-worker
          npx wrangler deploy
